hub:
  name: "Test Hub"
  database: "data/test_hub.db"
  health_check_interval: 60
  auto_restart: true
  max_restart_attempts: 3
  restart_delay: 3

servers:
  filesystem:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
    enabled: true
    aliases:
      read_file: "fs_read"
      write_file: "fs_write"
      list_directory: "fs_ls"
    depends_on: []

namespacing:
  mode: "auto"

tracking:
  enabled: true
  max_records: 10000
  track_params: false
  session_tracking: true

hotreload:
  enabled: false
  watch_interval: 5
